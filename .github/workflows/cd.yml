name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-backend-artifacts:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        runtime: [linux-x64, win-x64, osx-x64, osx-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish API service
        run: dotnet publish Eventask.ApiService/Eventask.ApiService.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishSingleFile=true -o ./artifacts/api-service

      - name: Publish migration worker
        run: dotnet publish Eventask.ApiService.MigrationWorker/Eventask.ApiService.MigrationWorker.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -p:PublishSingleFile=true -p:ErrorOnDuplicatePublishOutputFiles=false -o ./artifacts/migration-worker

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-service-${{ matrix.runtime }}-${{ github.sha }}
          path: ./artifacts/api-service

      - name: Upload migration worker artifact
        uses: actions/upload-artifact@v4
        with:
          name: migration-worker-${{ matrix.runtime }}-${{ github.sha }}
          path: ./artifacts/migration-worker
